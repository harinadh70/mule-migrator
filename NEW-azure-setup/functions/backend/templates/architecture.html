<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Architecture — MuleSoft to Spring Boot Migrator</title>
    <style>
        /* ================================================================
           CSS VARIABLES & RESET
           ================================================================ */
        :root {
            --bg: #0f1117;
            --surface: #1a1b26;
            --surface2: #1e2030;
            --surface3: #252840;
            --border: #2e3148;
            --border-light: #3d4166;
            --text: #e2e4f0;
            --text-dim: #8b8fa8;
            --text-muted: #5c6082;

            /* Layer colors */
            --client: #38bdf8;
            --client-bg: rgba(56,189,248,0.08);
            --client-border: rgba(56,189,248,0.3);

            --api: #6366f1;
            --api-bg: rgba(99,102,241,0.08);
            --api-border: rgba(99,102,241,0.3);

            --controller: #818cf8;
            --controller-bg: rgba(129,140,248,0.08);
            --controller-border: rgba(129,140,248,0.3);

            --service: #a78bfa;
            --service-bg: rgba(167,139,250,0.08);
            --service-border: rgba(167,139,250,0.3);

            --integration: #f59e0b;
            --integration-bg: rgba(245,158,11,0.08);
            --integration-border: rgba(245,158,11,0.3);

            --data: #22c55e;
            --data-bg: rgba(34,197,94,0.08);
            --data-border: rgba(34,197,94,0.3);

            --pipeline: #ec4899;
            --pipeline-bg: rgba(236,72,153,0.08);
            --pipeline-border: rgba(236,72,153,0.3);

            --tech-fe: #38bdf8;
            --tech-be: #a78bfa;
            --tech-mig: #f59e0b;
            --tech-int: #22c55e;
            --tech-llm: #ec4899;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow: hidden;
            height: 100vh;
        }

        /* ================================================================
           NAVBAR
           ================================================================ */
        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: 56px;
            backdrop-filter: blur(12px);
            background: rgba(26,27,38,0.92);
        }

        .navbar .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
        }
        .navbar h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }

        .navbar .right-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .review-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.25);
            color: var(--integration);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .review-badge .pulse {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--integration);
            animation: pulse-anim 2s infinite;
        }
        @keyframes pulse-anim {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .back-link {
            color: var(--api);
            text-decoration: none;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
            font-weight: 500;
        }
        .back-link:hover { color: var(--text); }

        /* ================================================================
           TAB BAR
           ================================================================ */
        .tab-bar {
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            z-index: 999;
            background: rgba(26,27,38,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 4px;
            height: 44px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 500;
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.25s;
            font-family: inherit;
            white-space: nowrap;
            position: relative;
        }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active {
            color: var(--api);
            border-bottom-color: var(--api);
        }
        .tab-btn .tab-icon {
            margin-right: 6px;
            font-size: 14px;
        }

        /* ================================================================
           ZOOM / PAN CONTROLS
           ================================================================ */
        .controls {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 998;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 4px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .ctrl-btn {
            width: 36px; height: 36px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            font-family: inherit;
        }
        .ctrl-btn:hover { background: var(--surface3); border-color: var(--border-light); }
        .ctrl-btn:active { transform: scale(0.93); }
        .zoom-label {
            font-size: 10px;
            color: var(--text-dim);
            text-align: center;
            padding: 2px 0;
            font-weight: 600;
            user-select: none;
        }

        /* ================================================================
           CANVAS AREA
           ================================================================ */
        .canvas-area {
            position: fixed;
            top: 100px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            cursor: grab;
        }
        .canvas-area.dragging { cursor: grabbing; }

        .canvas-inner {
            transform-origin: 0 0;
            will-change: transform;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* ================================================================
           VIEW CONTAINERS
           ================================================================ */
        .view {
            display: none;
            padding: 40px;
            min-width: 1200px;
        }
        .view.active { display: block; }

        /* ================================================================
           ARCHITECTURE DIAGRAM STYLES
           ================================================================ */

        /* Layer row */
        .arch-layer {
            display: flex;
            align-items: stretch;
            margin-bottom: 0;
            position: relative;
        }

        .layer-label {
            width: 180px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 16px 20px 16px 0;
            text-align: right;
        }
        .layer-label .label-name {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .layer-label .label-sub {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .layer-content {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            border-radius: 12px;
            position: relative;
            flex-wrap: wrap;
            border: 1px solid;
            min-height: 100px;
        }

        /* Layer themes */
        .layer-client .layer-label .label-name { color: var(--client); }
        .layer-client .layer-content { background: var(--client-bg); border-color: var(--client-border); }

        .layer-api .layer-label .label-name { color: var(--api); }
        .layer-api .layer-content { background: var(--api-bg); border-color: var(--api-border); }

        .layer-controller .layer-label .label-name { color: var(--controller); }
        .layer-controller .layer-content { background: var(--controller-bg); border-color: var(--controller-border); }

        .layer-service .layer-label .label-name { color: var(--service); }
        .layer-service .layer-content { background: var(--service-bg); border-color: var(--service-border); }

        .layer-integration .layer-label .label-name { color: var(--integration); }
        .layer-integration .layer-content { background: var(--integration-bg); border-color: var(--integration-border); }

        .layer-data .layer-label .label-name { color: var(--data); }
        .layer-data .layer-content { background: var(--data-bg); border-color: var(--data-border); }

        /* Component block */
        .comp {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            min-width: 150px;
            max-width: 200px;
            position: relative;
            transition: transform 0.25s cubic-bezier(.4,0,.2,1), box-shadow 0.25s, border-color 0.25s;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
            cursor: pointer;
            user-select: none;
        }
        .comp:hover {
            transform: scale(1.04) translateY(-2px);
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }
        .comp .comp-icon {
            font-size: 22px;
            margin-bottom: 6px;
            display: block;
        }
        .comp .comp-name {
            font-size: 13px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 3px;
        }
        .comp .comp-desc {
            font-size: 11px;
            color: var(--text-dim);
            line-height: 1.4;
        }

        /* Component color accents */
        .comp.c-client { border-left: 3px solid var(--client); }
        .comp.c-client:hover { border-color: var(--client); }
        .comp.c-client .comp-icon { color: var(--client); }

        .comp.c-api { border-left: 3px solid var(--api); }
        .comp.c-api:hover { border-color: var(--api); }
        .comp.c-api .comp-icon { color: var(--api); }

        .comp.c-controller { border-left: 3px solid var(--controller); }
        .comp.c-controller:hover { border-color: var(--controller); }
        .comp.c-controller .comp-icon { color: var(--controller); }

        .comp.c-service { border-left: 3px solid var(--service); }
        .comp.c-service:hover { border-color: var(--service); }
        .comp.c-service .comp-icon { color: var(--service); }

        .comp.c-integration { border-left: 3px solid var(--integration); }
        .comp.c-integration:hover { border-color: var(--integration); }
        .comp.c-integration .comp-icon { color: var(--integration); }

        .comp.c-data { border-left: 3px solid var(--data); }
        .comp.c-data:hover { border-color: var(--data); }
        .comp.c-data .comp-icon { color: var(--data); }

        /* Active/selected component glow */
        .comp.selected {
            box-shadow: 0 0 0 2px var(--api), 0 8px 40px rgba(99,102,241,0.25);
        }

        /* SVG connection lines between layers */
        .connections-svg {
            position: relative;
            width: 100%;
            overflow: visible;
        }
        .connections-svg svg {
            width: 100%;
            overflow: visible;
        }

        .conn-line {
            stroke-width: 1.5;
            fill: none;
            stroke-dasharray: 6 4;
            animation: dash-flow 1.2s linear infinite;
        }
        @keyframes dash-flow {
            to { stroke-dashoffset: -20; }
        }

        .conn-arrow-head {
            fill: var(--text-dim);
        }

        /* Layer connector strip */
        .layer-connector {
            display: flex;
            align-items: stretch;
        }
        .layer-connector .lc-spacer {
            width: 180px;
            flex-shrink: 0;
        }
        .layer-connector .lc-lines {
            flex: 1;
            height: 32px;
            position: relative;
        }
        .lc-lines svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }
        .lc-line {
            stroke: var(--border-light);
            stroke-width: 1.5;
            stroke-dasharray: 4 4;
            animation: dash-flow 1.5s linear infinite;
        }
        .lc-dot {
            r: 2.5;
            fill: var(--text-dim);
            animation: dot-flow 2s ease-in-out infinite;
        }
        @keyframes dot-flow {
            0% { opacity: 0; transform: translateY(-12px); }
            50% { opacity: 1; }
            100% { opacity: 0; transform: translateY(12px); }
        }

        /* Flow arrows between layers */
        .flow-arrows {
            display: flex;
            align-items: center;
            padding-left: 180px;
        }
        .flow-arrows .arrow-set {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 8px 0;
        }
        .flow-arrows .arrow-set svg {
            overflow: visible;
        }

        /* ================================================================
           DETAIL PANEL (click-to-open)
           ================================================================ */
        .detail-panel {
            position: fixed;
            top: 100px;
            right: -420px;
            width: 400px;
            bottom: 0;
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 997;
            padding: 28px 24px;
            overflow-y: auto;
            transition: right 0.35s cubic-bezier(.4,0,.2,1);
            box-shadow: -8px 0 40px rgba(0,0,0,0.4);
        }
        .detail-panel.open { right: 0; }

        .detail-panel .dp-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-dim);
            width: 28px;
            height: 28px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
        }
        .detail-panel .dp-close:hover { color: var(--text); border-color: var(--border-light); }

        .dp-icon { font-size: 32px; margin-bottom: 12px; }
        .dp-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .dp-category {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        .dp-desc {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.7;
            margin-bottom: 20px;
        }
        .dp-section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            margin-bottom: 8px;
            margin-top: 20px;
        }
        .dp-props {
            list-style: none;
        }
        .dp-props li {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }
        .dp-props li .prop-key { color: var(--text-dim); }
        .dp-props li .prop-val {
            color: var(--text);
            font-weight: 600;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 12px;
        }
        .dp-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 6px;
            margin-bottom: 4px;
        }

        /* ================================================================
           PIPELINE VIEW
           ================================================================ */
        .pipeline-view {
            display: flex;
            align-items: center;
            gap: 0;
            padding: 60px 20px;
            justify-content: center;
        }

        .pipe-step {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px 24px;
            width: 200px;
            text-align: center;
            position: relative;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        .pipe-step:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 48px rgba(0,0,0,0.5);
        }
        .pipe-step .pipe-num {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            color: #fff;
            margin: 0 auto 12px;
        }
        .pipe-step .pipe-icon { font-size: 28px; margin-bottom: 8px; }
        .pipe-step .pipe-name {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .pipe-step .pipe-sub {
            font-size: 11px;
            color: var(--text-dim);
            line-height: 1.5;
        }
        .pipe-step .pipe-io {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            font-size: 10px;
            color: var(--text-muted);
        }
        .pipe-step .pipe-io strong { color: var(--text-dim); }

        .pipe-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            flex-shrink: 0;
        }
        .pipe-arrow svg { overflow: visible; }

        /* ================================================================
           TECH STACK VIEW
           ================================================================ */
        .tech-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            padding: 40px 0;
            max-width: 1200px;
        }

        .tech-category {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
            transition: transform 0.25s, box-shadow 0.25s;
        }
        .tech-category:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }
        .tech-category .tc-header {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid;
        }
        .tech-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            font-size: 13px;
            transition: 0.15s;
            border-radius: 6px;
            padding: 6px 8px;
            margin: 0 -8px;
        }
        .tech-item:hover { background: var(--surface2); }
        .tech-item .ti-icon { font-size: 18px; width: 24px; text-align: center; }
        .tech-item .ti-name { font-weight: 600; }
        .tech-item .ti-desc { font-size: 11px; color: var(--text-dim); }

        /* ================================================================
           DATA FLOW VIEW
           ================================================================ */
        .dataflow-view {
            padding: 60px 20px;
        }
        .dataflow-track {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            margin-bottom: 40px;
        }
        .df-node {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px 20px;
            text-align: center;
            width: 155px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
            position: relative;
            transition: transform 0.25s, box-shadow 0.25s;
            cursor: pointer;
        }
        .df-node:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }
        .df-node .df-icon { font-size: 26px; margin-bottom: 6px; }
        .df-node .df-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
        .df-node .df-desc { font-size: 10px; color: var(--text-dim); }

        .df-arrow {
            width: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .df-detail-row {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .df-detail-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            width: 220px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }
        .df-detail-card .dfc-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .df-detail-card .dfc-list {
            list-style: none;
            font-size: 12px;
            color: var(--text-dim);
        }
        .df-detail-card .dfc-list li {
            padding: 3px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .df-detail-card .dfc-list li::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ================================================================
           LEGEND BAR
           ================================================================ */
        .legend-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 998;
            background: rgba(26,27,38,0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            justify-content: center;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 500;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
        }

        /* ================================================================
           ANIMATED FLOWING DOTS
           ================================================================ */
        @keyframes flow-dot {
            0% { offset-distance: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { offset-distance: 100%; opacity: 0; }
        }

        .flowing-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            position: absolute;
            animation: flow-dot 2s linear infinite;
        }

        /* ================================================================
           RESPONSIVE
           ================================================================ */
        @media (max-width: 1024px) {
            .tech-grid { grid-template-columns: repeat(3, 1fr); }
            .view { min-width: 900px; }
        }
        @media (max-width: 768px) {
            .tab-btn { padding: 8px 10px; font-size: 12px; }
            .legend-bar { gap: 12px; padding: 8px 12px; }
            .legend-item { font-size: 10px; }
        }

        /* ================================================================
           SCROLLBAR
           ================================================================ */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
    </style>
</head>
<body>

    <!-- ═══════════════════════════════════════════════════════════════
         NAVBAR
         ═══════════════════════════════════════════════════════════════ -->
    <nav class="navbar">
        <a href="/" class="logo">
            <svg width="28" height="28" viewBox="0 0 32 32" fill="none">

    <script>

           ================================================================ */

        try {
            const raw = localStorage.getItem('MigrationStore');

        } catch(e) { /* ignore */ }

        /* Extract discovered connectors/flows if available */
        const discovered = {
            connectors: (migrationData && migrationData.connectors) || [],
            flows: (migrationData && migrationData.flows) || [],
            endpoints: (migrationData && migrationData.endpoints) || [],
            projectName: (migrationData && migrationData.projectName) || 'Migrated Application'
        };

        /* ================================================================
           ARCHITECTURE DATA — components per layer
           ================================================================ */
        const archLayers = [
            {
                id: 'client',
                name: 'Client Layer',
                sub: 'External consumers',

                ]
            },
            {
                id: 'api',
                name: 'API Gateway',

                theme: 'api',
                color: 'var(--api)',
                components: [
                    { icon: '\u{1F6E1}\u{FE0F}', name: 'CORS Filter', desc: 'Cross-origin policy', details: { type: 'Filter', annotation: '@CrossOrigin', muleSource: 'http:listener-config', notes: 'Configures allowed origins, methods, and headers. Migrated from MuleSoft HTTP Listener configuration CORS settings.' }},
                    { icon: '\u{1F512}', name: 'Security Filter', desc: 'Auth & token validation', details: { type: 'Filter', annotation: '@Configuration + SecurityFilterChain', muleSource: 'mule-secure-properties', notes: 'Spring Security filter chain handling Basic Auth, JWT validation, or OAuth2. Migrated from MuleSoft security policies.' }},
                    { icon: '\u{1F4DD}', name: 'Request Logger', desc: 'Audit & tracing', details: { type: 'Filter', annotation: 'HandlerInterceptor', muleSource: 'logger component', notes: 'Request/response logging with correlation IDs for distributed tracing. Replaces MuleSoft logger components at flow entry points.' }},
                    { icon: '\u{1F6A6}', name: 'Rate Limiter', desc: 'Throttle requests', details: { type: 'Filter', annotation: '@Bean RateLimiter', muleSource: 'api-policy', notes: 'Request rate limiting to protect backend services. Migrated from MuleSoft API Manager throttling policies.' }},

            },
            {
                id: 'controller',
                name: 'Controller Layer',
                sub: 'REST endpoints',
                theme: 'controller',
                color: 'var(--controller)',
                components: buildControllerComponents()
            },
            {
                id: 'service',
                name: 'Service Layer',
                sub: 'Business logic',
                theme: 'service',
                color: 'var(--service)',
                components: [
                    { icon: '\u{2699}\u{FE0F}', name: 'Flow Processor', desc: 'Core business rules', details: { type: 'Service', annotation: '@Service @Transactional', muleSource: 'sub-flow, processor-chain', notes: 'Main business logic service. MuleSoft sub-flows and processor chains are converted to service methods with transaction management.' }},
                    { icon: '\u{1F504}', name: 'Transform Engine', desc: 'Data mapping', details: { type: 'Service', annotation: '@Component', muleSource: 'ee:transform (DataWeave)', notes: 'DataWeave transformations converted to Java Stream API operations, Jackson ObjectMapper mappings, and custom converter classes.' }},
                    { icon: '\u{1F500}', name: 'Router / Orchestrator', desc: 'Choice & scatter-gather', details: { type: 'Service', annotation: '@Service', muleSource: 'choice, scatter-gather, first-successful', notes: 'Choice routers become if/else or switch statements. Scatter-gather becomes CompletableFuture.allOf() for parallel execution.' }},
                    { icon: '\u{23F0}', name: 'Scheduler', desc: 'Cron-triggered jobs', details: { type: 'Service', annotation: '@Scheduled(cron=...)', muleSource: 'scheduler source', notes: 'MuleSoft scheduler sources (fixed-frequency, cron) are migrated to Spring @Scheduled methods with equivalent cron expressions.' }},
                    { icon: '\u{26A0}\u{FE0F}', name: 'Error Handler', desc: '@ControllerAdvice', details: { type: 'Service', annotation: '@ControllerAdvice @ExceptionHandler', muleSource: 'on-error-propagate, on-error-continue', notes: 'Global exception handling. on-error-propagate maps to re-thrown exceptions; on-error-continue maps to fallback responses.' }},
                ]
            },
            {
                id: 'integration',
                name: 'Integration Layer',
                sub: 'External connectors',
                theme: 'integration',
                color: 'var(--integration)',
                components: buildIntegrationComponents()
            },
            {
                id: 'data',
                name: 'Data Layer',
                sub: 'Persistence & storage',
                theme: 'data',
                color: 'var(--data)',
                components: [
                    { icon: '\u{1F5C3}\u{FE0F}', name: 'RDBMS', desc: 'PostgreSQL / MySQL / Oracle', details: { type: 'Data Store', springTech: 'JPA / JdbcTemplate', muleSource: 'db:connector', notes: 'Primary relational database. MuleSoft db:select, db:insert, db:update, db:delete operations map to Spring Data JPA repositories or JdbcTemplate queries.' }},
                    { icon: '\u{26A1}', name: 'Redis Cache', desc: 'Distributed caching', details: { type: 'Data Store', springTech: '@Cacheable + RedisTemplate', muleSource: 'objectstore:store', notes: 'MuleSoft ObjectStore operations converted to Spring Cache abstraction backed by Redis for session storage and caching.' }},
                    { icon: '\u{1F4C1}', name: 'File System', desc: 'Local & network storage', details: { type: 'Data Store', springTech: 'java.nio.file / ResourceLoader', muleSource: 'file:connector', notes: 'File read/write operations. MuleSoft file connector (read, write, list, move) mapped to Java NIO file operations.' }},
                    { icon: '\u{2601}\u{FE0F}', name: 'Object Storage', desc: 'S3 / Azure Blob', details: { type: 'Data Store', springTech: 'AWS SDK / Azure SDK', muleSource: 's3:connector, objectstore', notes: 'Cloud object storage for large file handling. S3 connector operations map to AWS SDK S3Client method calls.' }},
                ]
            }
        ];

        function buildControllerComponents() {
            const defaults = [
                { icon: '\u{1F4E5}', name: 'Resource Controller', desc: 'CRUD endpoints', details: { type: 'Controller', annotation: '@RestController @RequestMapping', methods: 'GET, POST, PUT, DELETE', muleSource: 'http:listener flows', notes: 'Primary REST controller handling standard CRUD operations. Each MuleSoft HTTP listener flow with GET/POST/PUT/DELETE methods becomes a controller method.' }},
                { icon: '\u{1F50D}', name: 'Search Controller', desc: 'Query & filter API', details: { type: 'Controller', annotation: '@RestController', methods: 'GET with @RequestParam', muleSource: 'http:listener with query params', notes: 'Handles search, filter, and pagination endpoints. Query parameters from MuleSoft HTTP listener are mapped to @RequestParam annotations.' }},
                { icon: '\u{1F4CA}', name: 'Health Controller', desc: 'Actuator endpoints', details: { type: 'Controller', annotation: 'Auto-configured', methods: 'GET /actuator/**', muleSource: 'N/A (Spring Boot)', notes: 'Spring Boot Actuator auto-configured health, metrics, and info endpoints. Provides /actuator/health, /actuator/info, /actuator/metrics.' }},
                { icon: '\u{1F4E4}', name: 'Webhook Controller', desc: 'Callback handlers', details: { type: 'Controller', annotation: '@RestController @PostMapping', methods: 'POST', muleSource: 'http:listener POST callbacks', notes: 'Handles incoming webhooks and callback URLs from external systems. MuleSoft HTTP listener flows that receive asynchronous notifications.' }},
            ];
            if (discovered.endpoints && discovered.endpoints.length > 0) {
                discovered.endpoints.slice(0, 3).forEach(ep => {
                    defaults.push({
                        icon: '\u{1F4CB}',
                        name: ep.path || ep.name || 'Endpoint',
                        desc: (ep.method || 'GET') + ' ' + (ep.path || ''),
                        details: { type: 'Controller', annotation: '@RestController', methods: ep.method || 'GET', muleSource: ep.source || 'http:listener', notes: 'Discovered from migration analysis.' }
                    });
                });
            }
            return defaults;
        }

        function buildIntegrationComponents() {
            const defaults = [
                { icon: '\u{1F4E8}', name: 'JMS Client', desc: 'Message queues', details: { type: 'Integration', springTech: 'JmsTemplate / @JmsListener', muleSource: 'jms:connector', notes: 'JMS message queue integration. MuleSoft jms:publish maps to JmsTemplate.convertAndSend(); jms:listener maps to @JmsListener annotated methods.' }},
                { icon: '\u{1F4E1}', name: 'HTTP Client', desc: 'Outbound REST calls', details: { type: 'Integration', springTech: 'RestTemplate / WebClient', muleSource: 'http:request', notes: 'Outbound HTTP calls to external APIs. MuleSoft http:request operations converted to RestTemplate or WebClient calls with equivalent headers, auth, and timeout configs.' }},
                { icon: '\u{1F4E9}', name: 'Kafka Producer', desc: 'Event streaming', details: { type: 'Integration', springTech: 'KafkaTemplate / @KafkaListener', muleSource: 'kafka:connector', notes: 'Apache Kafka integration for event-driven messaging. Kafka publish operations map to KafkaTemplate.send(); consumer flows become @KafkaListener methods.' }},
                { icon: '\u{1F4C2}', name: 'SFTP Client', desc: 'Secure file transfer', details: { type: 'Integration', springTech: 'Spring Integration SFTP', muleSource: 'sftp:connector', notes: 'SFTP file operations for secure file exchange. MuleSoft sftp:read/write/list operations map to Spring Integration SFTP inbound/outbound adapters.' }},
                { icon: '\u{2709}\u{FE0F}', name: 'Email Service', desc: 'SMTP notifications', details: { type: 'Integration', springTech: 'JavaMailSender', muleSource: 'email:connector', notes: 'Email sending capability. MuleSoft email:send operations map to Spring JavaMailSender with MimeMessage construction.' }},
                { icon: '\u{1F4AC}', name: 'AMQP Client', desc: 'RabbitMQ messaging', details: { type: 'Integration', springTech: 'AmqpTemplate / @RabbitListener', muleSource: 'amqp:connector', notes: 'AMQP/RabbitMQ integration. MuleSoft amqp:publish maps to AmqpTemplate; amqp:listener becomes @RabbitListener methods.' }},
            ];
            /* Add discovered connectors */
            if (discovered.connectors && discovered.connectors.length > 0) {
                const knownNames = new Set(defaults.map(d => d.name.toLowerCase()));
                discovered.connectors.forEach(c => {
                    const nm = (c.name || c.type || '').toLowerCase();
                    if (!knownNames.has(nm)) {
                        defaults.push({
                            icon: '\u{1F50C}',
                            name: c.name || c.type || 'Connector',
                            desc: c.description || 'Custom connector',
                            details: { type: 'Integration', springTech: c.springEquivalent || 'Custom Bean', muleSource: c.muleType || 'connector', notes: 'Discovered from migration analysis: ' + (c.name || c.type) }
                        });
                    }
                });
            }
            return defaults;
        }

        /* ================================================================
           PIPELINE DATA
           ================================================================ */
        const pipelineSteps = [
            { num: 1, icon: '\u{1F4C4}', name: 'XML Parse', sub: 'Parse MuleSoft XML configs', io: 'Input: .xml files | Output: AST', color: 'var(--client)', details: 'Uses lxml to parse MuleSoft configuration XML files into an abstract syntax tree. Handles mule-app.xml, global configs, and flow definitions. Resolves property placeholders and imports.' },
            { num: 2, icon: '\u{1F5FA}\u{FE0F}', name: 'Connector Map', sub: 'Map MuleSoft to Spring', io: 'Input: AST | Output: Component map', color: 'var(--api)', details: 'Maps each MuleSoft connector (HTTP, DB, JMS, SFTP, etc.) to its Spring Boot equivalent. Builds a dependency graph of all components, their configurations, and inter-dependencies.' },
            { num: 3, icon: '\u{1F504}', name: 'DataWeave Convert', sub: 'Transform DW to Java', io: 'Input: .dwl files | Output: Java code', color: 'var(--service)', details: 'Converts DataWeave 2.0 transformation scripts to equivalent Java code using Jackson, Stream API, and custom helper methods. Handles map, filter, reduce, pluck, and complex nested transformations.' },
            { num: 4, icon: '\u{1F528}', name: 'Code Generate', sub: 'Generate Spring Boot project', io: 'Input: Component map | Output: .java files', color: 'var(--integration)', details: 'Generates complete Spring Boot project structure including controllers, services, repositories, configuration classes, application.yml, pom.xml with correct dependencies, and test stubs.' },
            { num: 5, icon: '\u{1F916}', name: 'LLM Review', sub: 'AI-powered code review', io: 'Input: Generated code | Output: Reviewed code', color: 'var(--pipeline)', details: 'Sends generated code to LLM (Anthropic/OpenAI/Google/Groq/DeepSeek/Ollama) for intelligent review. The LLM validates correctness, suggests improvements, fixes edge cases, and ensures idiomatic Spring Boot patterns.' },
        ];

        /* ================================================================
           TECH STACK DATA
           ================================================================ */
        const techStack = [
            {
                name: 'Frontend', color: 'var(--tech-fe)',
                items: [
                    { icon: '\u{1F310}', name: 'HTML5', desc: 'Semantic markup' },
                    { icon: '\u{1F3A8}', name: 'CSS3', desc: 'Custom properties, Grid, Flexbox' },
                    { icon: '\u{26A1}', name: 'JavaScript', desc: 'ES6+ vanilla JS' },
                    { icon: '\u{1F4DD}', name: 'CodeMirror', desc: 'Code editor widget' },
                ]
            },
            {
                name: 'Backend', color: 'var(--tech-be)',
                items: [
                    { icon: '\u{1F40D}', name: 'Python 3.10+', desc: 'Core runtime' },
                    { icon: '\u{1F3ED}', name: 'Flask', desc: 'Web framework' },
                    { icon: '\u{1F680}', name: 'Gunicorn', desc: 'WSGI HTTP server' },
                    { icon: '\u{1F504}', name: 'Jinja2', desc: 'Template engine' },
                ]
            },
            {
                name: 'Migration Engine', color: 'var(--tech-mig)',
                items: [
                    { icon: '\u{1F333}', name: 'lxml', desc: 'XML/XPath parsing' },
                    { icon: '\u{1F4CB}', name: 'PyYAML', desc: 'YAML generation' },
                    { icon: '\u{2699}\u{FE0F}', name: 'Custom Parsers', desc: 'DataWeave, MEL converters' },
                    { icon: '\u{1F4C4}', name: 'Jinja2 Templates', desc: 'Code generation templates' },
                ]
            },
            {
                name: 'Integration', color: 'var(--tech-int)',
                items: [
                    { icon: '\u{1F419}', name: 'PyGithub', desc: 'GitHub repo integration' },
                    { icon: '\u{1F433}', name: 'Docker SDK', desc: 'Container management' },
                    { icon: '\u{1F4E6}', name: 'Maven Wrapper', desc: 'Build validation' },
                    { icon: '\u{1F4C1}', name: 'zipfile', desc: 'Project packaging' },
                ]
            },
            {
                name: 'LLM Providers', color: 'var(--tech-llm)',
                items: [
                    { icon: '\u{1F9E0}', name: 'Anthropic', desc: 'Claude models' },
                    { icon: '\u{2728}', name: 'OpenAI', desc: 'GPT models' },
                    { icon: '\u{1F48E}', name: 'Google', desc: 'Gemini models' },

        ];

        /* ================================================================
           RENDER: ARCHITECTURE VIEW
           ================================================================ */
        function renderArchitecture() {
            const container = document.getElementById('view-architecture');
            let html = '<div style="padding:10px 0 20px 180px;"><span style="font-size:22px;font-weight:700;">Spring Boot Application Architecture</span><span style="margin-left:12px;font-size:13px;color:var(--text-dim);">Migrated from MuleSoft</span></div>';

            archLayers.forEach((layer, li) => {
                /* Layer row */
                html += '<div class="arch-layer layer-' + layer.theme + '">';
                html += '<div class="layer-label"><div class="label-name">' + layer.name + '</div><div class="label-sub">' + layer.sub + '</div></div>';
                html += '<div class="layer-content">';
                layer.components.forEach((comp, ci) => {
                    html += '<div class="comp c-' + layer.theme + '" data-layer="' + li + '" data-comp="' + ci + '">';
                    html += '<span class="comp-icon">' + comp.icon + '</span>';
                    html += '<div class="comp-name">' + comp.name + '</div>';
                    html += '<div class="comp-desc">' + comp.desc + '</div>';
                    html += '</div>';
                });
                html += '</div></div>';

                /* Arrow strip between layers */
                if (li < archLayers.length - 1) {
                    html += renderLayerArrows(layer.color, archLayers[li+1].color);
                }
            });

            container.innerHTML = html;

            /* Attach click handlers */
            container.querySelectorAll('.comp').forEach(el => {
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const li = parseInt(this.dataset.layer);
                    const ci = parseInt(this.dataset.comp);
                    const layer = archLayers[li];
                    const comp = layer.components[ci];
                    showDetail(comp, layer);

                    /* Visual selection */
                    container.querySelectorAll('.comp').forEach(c => c.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });
        }

        function renderLayerArrows(fromColor, toColor) {
            const count = 5;
            let svg = '<div class="layer-connector"><div class="lc-spacer"></div><div class="lc-lines"><svg viewBox="0 0 1000 32" preserveAspectRatio="none">';
            svg += '<defs><linearGradient id="lg_' + (fromColor+toColor).replace(/[^a-zA-Z0-9]/g,'') + '" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="' + fromColor + '" stop-opacity="0.5"/><stop offset="100%" stop-color="' + toColor + '" stop-opacity="0.5"/></linearGradient></defs>';
            for (let i = 0; i < count; i++) {
                const x = 100 + i * 200;
                svg += '<line x1="' + x + '" y1="2" x2="' + x + '" y2="30" class="lc-line" stroke="url(#lg_' + (fromColor+toColor).replace(/[^a-zA-Z0-9]/g,'') + ')"/>';
                /* Arrow head */
                svg += '<polygon points="' + (x-4) + ',24 ' + x + ',32 ' + (x+4) + ',24" fill="' + toColor + '" opacity="0.5"/>';
                /* Flowing dot */
                svg += '<circle cx="' + x + '" cy="16" r="2.5" fill="' + toColor + '" opacity="0.7"><animate attributeName="cy" from="2" to="30" dur="' + (1.5 + i*0.3) + 's" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="' + (1.5 + i*0.3) + 's" repeatCount="indefinite"/></circle>';
            }
            svg += '</svg></div></div>';
            return svg;
        }

        /* ================================================================
           RENDER: PIPELINE VIEW
           ================================================================ */
        function renderPipeline() {
            const container = document.getElementById('view-pipeline');
            let html = '<div style="margin-bottom:32px;"><span style="font-size:22px;font-weight:700;">Migration Pipeline</span><span style="margin-left:12px;font-size:13px;color:var(--text-dim);">5-stage automated conversion process</span></div>';
            html += '<div class="pipeline-view">';

            pipelineSteps.forEach((step, i) => {
                html += '<div class="pipe-step" style="border-top:3px solid ' + step.color + ';" data-pipe="' + i + '">';
                html += '<div class="pipe-num" style="background:' + step.color + ';">' + step.num + '</div>';
                html += '<div class="pipe-icon">' + step.icon + '</div>';
                html += '<div class="pipe-name">' + step.name + '</div>';
                html += '<div class="pipe-sub">' + step.sub + '</div>';
                html += '<div class="pipe-io"><strong>I/O:</strong> ' + step.io + '</div>';
                html += '</div>';

                if (i < pipelineSteps.length - 1) {
                    html += '<div class="pipe-arrow"><svg width="60" height="24" viewBox="0 0 60 24">';
                    html += '<defs><linearGradient id="pa' + i + '" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="' + step.color + '"/><stop offset="100%" stop-color="' + pipelineSteps[i+1].color + '"/></linearGradient></defs>';
                    html += '<line x1="0" y1="12" x2="48" y2="12" stroke="url(#pa' + i + ')" stroke-width="2" stroke-dasharray="5 3"><animate attributeName="stroke-dashoffset" from="0" to="-16" dur="1s" repeatCount="indefinite"/></line>';
                    html += '<polygon points="46,6 58,12 46,18" fill="' + pipelineSteps[i+1].color + '"/>';
                    /* Flowing dot */
                    html += '<circle r="3" fill="' + pipelineSteps[i+1].color + '"><animate attributeName="cx" from="0" to="48" dur="1.8s" repeatCount="indefinite"/><animate attributeName="cy" values="12;12" dur="1.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite"/></circle>';
                    html += '</svg></div>';
                }
            });

            html += '</div>';

            /* Detailed breakdown below */
            html += '<div style="margin-top:48px;padding:0 40px;">';
            html += '<div style="font-size:16px;font-weight:700;margin-bottom:20px;">Pipeline Stage Details</div>';
            html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:16px;">';
            pipelineSteps.forEach((step, i) => {
                html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;border-left:3px solid ' + step.color + ';">';
                html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">';
                html += '<span style="font-size:20px;">' + step.icon + '</span>';
                html += '<span style="font-size:15px;font-weight:700;">Step ' + step.num + ': ' + step.name + '</span>';
                html += '</div>';
                html += '<div style="font-size:13px;color:var(--text-dim);line-height:1.7;">' + step.details + '</div>';
                html += '</div>';
            });
            html += '</div></div>';

            container.innerHTML = html;

            /* Click on pipe-step to show detail */
            container.querySelectorAll('.pipe-step').forEach(el => {
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const idx = parseInt(this.dataset.pipe);
                    const step = pipelineSteps[idx];
                    showDetail({
                        icon: step.icon,
                        name: step.name,
                        desc: step.sub,
                        details: { type: 'Pipeline Stage', step: 'Step ' + step.num, io: step.io, notes: step.details }
                    }, { name: 'Migration Pipeline', color: step.color });
                });
            });
        }

        /* ================================================================
           RENDER: TECH STACK VIEW
           ================================================================ */
        function renderTechStack() {
            const container = document.getElementById('view-techstack');
            let html = '<div style="margin-bottom:24px;"><span style="font-size:22px;font-weight:700;">Technology Stack</span><span style="margin-left:12px;font-size:13px;color:var(--text-dim);">Full stack of technologies powering the migrator</span></div>';
            html += '<div class="tech-grid">';

            techStack.forEach(cat => {
                html += '<div class="tech-category">';
                html += '<div class="tc-header" style="color:' + cat.color + ';border-bottom-color:' + cat.color + ';">' + cat.name + '</div>';
                cat.items.forEach(item => {
                    html += '<div class="tech-item">';
                    html += '<span class="ti-icon">' + item.icon + '</span>';
                    html += '<div><div class="ti-name">' + item.name + '</div><div class="ti-desc">' + item.desc + '</div></div>';
                    html += '</div>';
                });
                html += '</div>';
            });

            html += '</div>';
            container.innerHTML = html;
        }

        /* ================================================================
           RENDER: DATA FLOW VIEW
           ================================================================ */
        function renderDataFlow() {
            const container = document.getElementById('view-dataflow');
            const stages = [
                { icon: '\u{1F4C4}', name: 'Input', desc: 'MuleSoft XML', color: 'var(--client)', border: 'var(--client-border)' },
                { icon: '\u{1F333}', name: 'Parser', desc: 'lxml / XPath', color: 'var(--api)', border: 'var(--api-border)' },
                { icon: '\u{1F5FA}\u{FE0F}', name: 'Mapper', desc: 'Connector mapping', color: 'var(--controller)', border: 'var(--controller-border)' },
                { icon: '\u{1F504}', name: 'Converter', desc: 'DataWeave to Java', color: 'var(--service)', border: 'var(--service-border)' },
                { icon: '\u{1F528}', name: 'Generator', desc: 'Code templates', color: 'var(--integration)', border: 'var(--integration-border)' },
                { icon: '\u{2705}', name: 'Validator', desc: 'LLM review', color: 'var(--pipeline)', border: 'var(--pipeline-border)' },
                { icon: '\u{1F4E6}', name: 'Output', desc: 'Spring Boot project', color: 'var(--data)', border: 'var(--data-border)' },
            ];

            let html = '<div style="margin-bottom:32px;"><span style="font-size:22px;font-weight:700;">Data Flow Diagram</span><span style="margin-left:12px;font-size:13px;color:var(--text-dim);">End-to-end data transformation pipeline</span></div>';
            html += '<div class="dataflow-track">';

            stages.forEach((s, i) => {
                html += '<div class="df-node" style="border-top:3px solid ' + s.color + ';">';
                html += '<div class="df-icon">' + s.icon + '</div>';
                html += '<div class="df-name" style="color:' + s.color + ';">' + s.name + '</div>';
                html += '<div class="df-desc">' + s.desc + '</div>';
                html += '</div>';
                if (i < stages.length - 1) {
                    html += '<div class="df-arrow"><svg width="48" height="20" viewBox="0 0 48 20">';
                    html += '<line x1="0" y1="10" x2="36" y2="10" stroke="' + s.color + '" stroke-width="1.5" stroke-dasharray="4 3"><animate attributeName="stroke-dashoffset" from="0" to="-14" dur="1s" repeatCount="indefinite"/></line>';
                    html += '<polygon points="34,5 46,10 34,15" fill="' + stages[i+1].color + '"/>';
                    html += '<circle r="2.5" fill="' + stages[i+1].color + '"><animate attributeName="cx" from="0" to="36" dur="2s" repeatCount="indefinite"/><animate attributeName="cy" values="10;10" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite"/></circle>';
                    html += '</svg></div>';
                }
            });
            html += '</div>';

            /* Data detail cards */
            html += '<div style="margin-top:40px;"><div style="font-size:16px;font-weight:700;margin-bottom:20px;text-align:center;">Data Artifacts at Each Stage</div></div>';
            html += '<div class="df-detail-row">';

            const artifacts = [
                { icon: '\u{1F4C4}', title: 'Input Artifacts', color: 'var(--client)', items: ['mule-app.xml configuration', 'global-config.xml properties', '.dwl DataWeave scripts', '.properties placeholder files', 'RAML / OAS API specs'] },
                { icon: '\u{1F333}', title: 'Parsed Structure', color: 'var(--api)', items: ['Flow dependency graph', 'Connector configuration map', 'Property resolution table', 'Error handler hierarchy', 'Global config references'] },
                { icon: '\u{1F504}', title: 'Transformation Output', color: 'var(--service)', items: ['Java Stream operations', 'Jackson ObjectMapper calls', 'DTO class definitions', 'Converter utility methods', 'Type mapping tables'] },
                { icon: '\u{1F528}', title: 'Generated Code', color: 'var(--integration)', items: ['@RestController classes', '@Service business logic', '@Repository data access', 'application.yml config', 'pom.xml dependencies'] },
                { icon: '\u{1F4E6}', title: 'Final Output', color: 'var(--data)', items: ['Complete Maven project', 'Runnable Spring Boot app', 'Unit test stubs', 'Docker configuration', 'API documentation'] },
            ];

            artifacts.forEach(a => {
                html += '<div class="df-detail-card" style="border-top:3px solid ' + a.color + ';">';
                html += '<div class="dfc-title"><span>' + a.icon + '</span><span>' + a.title + '</span></div>';
                html += '<ul class="dfc-list">';
                a.items.forEach(item => {
                    html += '<li style="color:var(--text-dim);"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:' + a.color + ';margin-right:8px;flex-shrink:0;"></span>' + item + '</li>';
                });
                html += '</ul></div>';
            });

            html += '</div>';
            container.innerHTML = html;
        }

        /* ================================================================
           DETAIL PANEL
           ================================================================ */
        function showDetail(comp, layer) {
            const panel = document.getElementById('detailPanel');
            const content = document.getElementById('dpContent');
            const d = comp.details || {};

            let categoryColor = layer.color || 'var(--api)';
            let html = '<div class="dp-icon">' + comp.icon + '</div>';
            html += '<div class="dp-title">' + comp.name + '</div>';
            html += '<div class="dp-category" style="color:' + categoryColor + ';">' + (layer.name || '') + '</div>';
            html += '<div class="dp-desc">' + (d.notes || comp.desc || '') + '</div>';

            /* Properties */
            html += '<div class="dp-section-title">Properties</div>';
            html += '<ul class="dp-props">';
            Object.keys(d).forEach(key => {
                if (key === 'notes') return;
                html += '<li><span class="prop-key">' + formatPropKey(key) + '</span><span class="prop-val">' + d[key] + '</span></li>';
            });
            html += '</ul>';

            /* Tags */
            if (d.muleSource) {
                html += '<div class="dp-section-title" style="margin-top:20px;">Migration Source</div>';
                html += '<div><span class="dp-tag" style="background:rgba(99,102,241,0.12);color:var(--controller);">MuleSoft: ' + d.muleSource + '</span></div>';
            }
            if (d.annotation) {
                html += '<div style="margin-top:8px;"><span class="dp-tag" style="background:rgba(34,197,94,0.12);color:var(--data);">Spring: ' + d.annotation + '</span></div>';
            }
            if (d.springTech) {
                html += '<div style="margin-top:8px;"><span class="dp-tag" style="background:rgba(34,197,94,0.12);color:var(--data);">Spring: ' + d.springTech + '</span></div>';
            }

            content.innerHTML = html;
            panel.classList.add('open');
        }

        function formatPropKey(key) {
            return key.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase());
        }

        /* Close detail panel */
        document.getElementById('dpClose').addEventListener('click', () => {
            document.getElementById('detailPanel').classList.remove('open');
            document.querySelectorAll('.comp.selected').forEach(c => c.classList.remove('selected'));
        });

        /* Click on canvas background closes panel */
        document.getElementById('canvasArea').addEventListener('click', (e) => {
            if (e.target === e.currentTarget || e.target.id === 'canvasInner') {
                document.getElementById('detailPanel').classList.remove('open');
                document.querySelectorAll('.comp.selected').forEach(c => c.classList.remove('selected'));
            }
        });

        /* ================================================================
           TAB SWITCHING
           ================================================================ */
        const tabs = document.querySelectorAll('.tab-btn');
        const views = document.querySelectorAll('.view');

        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                const viewId = this.dataset.view;
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                views.forEach(v => v.classList.remove('active'));
                document.getElementById('view-' + viewId).classList.add('active');

                /* Close detail panel on view switch */
                document.getElementById('detailPanel').classList.remove('open');

                /* Reset pan/zoom */
                resetView();
            });
        });

        /* ================================================================
           PAN & ZOOM
           ================================================================ */
        let scale = 1;
        let panX = 0, panY = 0;
        let isDragging = false;
        let dragStartX = 0, dragStartY = 0;
        let dragStartPanX = 0, dragStartPanY = 0;

        const canvasArea = document.getElementById('canvasArea');
        const canvasInner = document.getElementById('canvasInner');

        function applyTransform() {
            canvasInner.style.transform = 'translate(' + panX + 'px, ' + panY + 'px) scale(' + scale + ')';
            document.getElementById('zoomLabel').textContent = Math.round(scale * 100) + '%';
        }

        function resetView() {
            scale = 1;
            panX = 20;
            panY = 20;
            applyTransform();
        }

        /* Mouse drag */
        canvasArea.addEventListener('mousedown', (e) => {
            /* Don't drag if clicking on a component */
            if (e.target.closest('.comp') || e.target.closest('.pipe-step') || e.target.closest('.df-node') || e.target.closest('.tech-item')) return;
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            dragStartPanX = panX;
            dragStartPanY = panY;
            canvasArea.classList.add('dragging');
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            panX = dragStartPanX + (e.clientX - dragStartX);
            panY = dragStartPanY + (e.clientY - dragStartY);
            applyTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            canvasArea.classList.remove('dragging');
        });

        /* Mouse wheel zoom */
        canvasArea.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.08 : 0.08;
            const newScale = Math.min(3, Math.max(0.2, scale + delta));

            /* Zoom toward cursor */
            const rect = canvasArea.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            panX = mx - (mx - panX) * (newScale / scale);
            panY = my - (my - panY) * (newScale / scale);
            scale = newScale;
            applyTransform();
        }, { passive: false });

        /* Zoom controls */
        document.getElementById('zoomIn').addEventListener('click', () => {
            scale = Math.min(3, scale + 0.15);
            applyTransform();
        });
        document.getElementById('zoomOut').addEventListener('click', () => {
            scale = Math.max(0.2, scale - 0.15);
            applyTransform();
        });
        document.getElementById('zoomFit').addEventListener('click', () => {
            resetView();
        });

        /* Touch support */
        let lastTouchDist = 0;
        canvasArea.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                dragStartX = e.touches[0].clientX;
                dragStartY = e.touches[0].clientY;
                dragStartPanX = panX;
                dragStartPanY = panY;
            } else if (e.touches.length === 2) {
                isDragging = false;
                lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            }
        }, { passive: true });

        canvasArea.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1 && isDragging) {
                panX = dragStartPanX + (e.touches[0].clientX - dragStartX);
                panY = dragStartPanY + (e.touches[0].clientY - dragStartY);
                applyTransform();
            } else if (e.touches.length === 2) {
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                const delta = (dist - lastTouchDist) * 0.005;
                scale = Math.min(3, Math.max(0.2, scale + delta));
                lastTouchDist = dist;
                applyTransform();
            }
        }, { passive: true });

        canvasArea.addEventListener('touchend', () => { isDragging = false; });

        /* ================================================================
           KEYBOARD SHORTCUTS
           ================================================================ */
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('detailPanel').classList.remove('open');
                document.querySelectorAll('.comp.selected').forEach(c => c.classList.remove('selected'));
            }
            if (e.key === '1') tabs[0].click();
            if (e.key === '2') tabs[1].click();
            if (e.key === '3') tabs[2].click();
            if (e.key === '4') tabs[3].click();
            if (e.key === '+' || e.key === '=') { scale = Math.min(3, scale + 0.15); applyTransform(); }
            if (e.key === '-') { scale = Math.max(0.2, scale - 0.15); applyTransform(); }
            if (e.key === '0') resetView();
        });

        /* ================================================================
           INIT
           ================================================================ */
        renderArchitecture();
        renderPipeline();
        renderTechStack();
        renderDataFlow();
        resetView();

    })();
    </script>
</body>
</html>
