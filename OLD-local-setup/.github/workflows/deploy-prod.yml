name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g., sha-abc1234 or v1.0.0)"
        required: true
        type: string
      skip_canary:
        description: "Skip canary and deploy 100% immediately"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  HELM_RELEASE: migrator-prod
  KUBE_NAMESPACE: migrator-production

jobs:
  approval:
    name: Production Approval
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approved
        run: echo "Deployment approved for tag ${{ inputs.image_tag }}"

  canary:
    name: Canary Deployment (10%)
    runs-on: ubuntu-latest
    needs: approval
    if: ${{ !inputs.skip_canary }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.PROD_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Add Bitnami repo
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Build Helm dependencies
        run: helm dependency build deploy/helm/migrator-platform

      - name: Deploy canary (10%)
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }}-canary \
            deploy/helm/migrator-platform \
            --namespace ${{ env.KUBE_NAMESPACE }} \
            --set image.tag=${{ inputs.image_tag }} \
            --set image.registry=${{ env.REGISTRY }} \
            --set image.repository=${{ github.repository }} \
            --set api.replicaCount=1 \
            --set api.autoscaling.enabled=false \
            --set celery.migration.replicaCount=1 \
            --set celery.migration.autoscaling.enabled=false \
            --set celery.build.replicaCount=1 \
            --set celery.build.autoscaling.enabled=false \
            --set secrets.anthropicApiKey=${{ secrets.ANTHROPIC_API_KEY }} \
            --set secrets.postgresPassword=${{ secrets.PROD_DB_PASSWORD }} \
            --set secrets.secretKey=${{ secrets.PROD_SECRET_KEY }} \
            --set config.environment=production \
            --set ingress.enabled=false \
            --set migration.enabled=false \
            --wait \
            --timeout 10m

      - name: Wait and monitor error rate (10% canary)
        run: |
          echo "Monitoring canary for 5 minutes..."
          CANARY_SVC="${{ env.HELM_RELEASE }}-canary-migrator-platform-api"
          ERRORS=0
          TOTAL=0
          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(kubectl exec -n ${{ env.KUBE_NAMESPACE }} \
              deploy/${CANARY_SVC} -- \
              python -c "import urllib.request; print(urllib.request.urlopen('http://localhost:8000/health').status)" \
              2>/dev/null || echo "500")
            TOTAL=$((TOTAL + 1))
            if [[ "$STATUS" != "200" ]]; then
              ERRORS=$((ERRORS + 1))
            fi
            ERROR_RATE=$(echo "scale=2; $ERRORS * 100 / $TOTAL" | bc)
            echo "  Check ${i}/30: HTTP ${STATUS} (error rate: ${ERROR_RATE}%)"
            if (( $(echo "$ERROR_RATE > 1" | bc -l) )); then
              echo "ERROR: Error rate ${ERROR_RATE}% exceeds 1% threshold"
              echo "Rolling back canary..."
              helm uninstall ${{ env.HELM_RELEASE }}-canary -n ${{ env.KUBE_NAMESPACE }} || true
              exit 1
            fi
          done
          echo "Canary at 10% passed. Error rate: ${ERROR_RATE}%"

  canary-50:
    name: Canary Deployment (50%)
    runs-on: ubuntu-latest
    needs: canary
    if: ${{ !inputs.skip_canary }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.PROD_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Scale canary to 50%
        run: |
          kubectl scale deployment ${{ env.HELM_RELEASE }}-canary-migrator-platform-api \
            --replicas=3 \
            -n ${{ env.KUBE_NAMESPACE }}
          kubectl rollout status deployment/${{ env.HELM_RELEASE }}-canary-migrator-platform-api \
            -n ${{ env.KUBE_NAMESPACE }} --timeout=300s

      - name: Wait and monitor error rate (50% canary)
        run: |
          echo "Monitoring canary at 50% for 5 minutes..."
          CANARY_SVC="${{ env.HELM_RELEASE }}-canary-migrator-platform-api"
          ERRORS=0
          TOTAL=0
          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(kubectl exec -n ${{ env.KUBE_NAMESPACE }} \
              deploy/${CANARY_SVC} -- \
              python -c "import urllib.request; print(urllib.request.urlopen('http://localhost:8000/health').status)" \
              2>/dev/null || echo "500")
            TOTAL=$((TOTAL + 1))
            if [[ "$STATUS" != "200" ]]; then
              ERRORS=$((ERRORS + 1))
            fi
            ERROR_RATE=$(echo "scale=2; $ERRORS * 100 / $TOTAL" | bc)
            echo "  Check ${i}/30: HTTP ${STATUS} (error rate: ${ERROR_RATE}%)"
            if (( $(echo "$ERROR_RATE > 1" | bc -l) )); then
              echo "ERROR: Error rate ${ERROR_RATE}% exceeds 1% threshold"
              echo "Rolling back canary..."
              helm uninstall ${{ env.HELM_RELEASE }}-canary -n ${{ env.KUBE_NAMESPACE }} || true
              exit 1
            fi
          done
          echo "Canary at 50% passed. Error rate: ${ERROR_RATE}%"

  full-deploy:
    name: Full Production Deploy (100%)
    runs-on: ubuntu-latest
    needs: [approval, canary-50]
    if: always() && needs.approval.result == 'success' && (needs.canary-50.result == 'success' || inputs.skip_canary)
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.PROD_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Add Bitnami repo
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Build Helm dependencies
        run: helm dependency build deploy/helm/migrator-platform

      - name: Remove canary
        run: helm uninstall ${{ env.HELM_RELEASE }}-canary -n ${{ env.KUBE_NAMESPACE }} 2>/dev/null || true

      - name: Deploy to production (100%)
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} \
            deploy/helm/migrator-platform \
            --namespace ${{ env.KUBE_NAMESPACE }} \
            --create-namespace \
            --set image.tag=${{ inputs.image_tag }} \
            --set image.registry=${{ env.REGISTRY }} \
            --set image.repository=${{ github.repository }} \
            --set secrets.anthropicApiKey=${{ secrets.ANTHROPIC_API_KEY }} \
            --set secrets.postgresPassword=${{ secrets.PROD_DB_PASSWORD }} \
            --set secrets.secretKey=${{ secrets.PROD_SECRET_KEY }} \
            --set config.environment=production \
            --set ingress.hosts[0].host=${{ vars.PROD_HOSTNAME }} \
            --set ingress.hosts[0].paths[0].path=/ \
            --set ingress.hosts[0].paths[0].pathType=Prefix \
            --set ingress.tls[0].secretName=migrator-prod-tls \
            --set ingress.tls[0].hosts[0]=${{ vars.PROD_HOSTNAME }} \
            --wait \
            --timeout 15m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/${{ env.HELM_RELEASE }}-migrator-platform-api \
            -n ${{ env.KUBE_NAMESPACE }} --timeout=300s

      - name: Post-deploy health check
        run: |
          sleep 30
          STATUS=$(curl -sf -o /dev/null -w '%{http_code}' "https://${{ vars.PROD_HOSTNAME }}/health" || echo "000")
          if [[ "$STATUS" != "200" ]]; then
            echo "CRITICAL: Production health check failed (HTTP ${STATUS})"
            echo "Initiating automatic rollback..."
            helm rollback ${{ env.HELM_RELEASE }} -n ${{ env.KUBE_NAMESPACE }}
            exit 1
          fi
          echo "Production deployment verified. Health check passed."
