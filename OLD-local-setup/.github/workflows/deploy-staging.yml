name: Deploy to Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  HELM_RELEASE: migrator-staging
  KUBE_NAMESPACE: migrator-staging

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=staging

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Add Bitnami repo
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Build Helm dependencies
        run: helm dependency build deploy/helm/migrator-platform

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} \
            deploy/helm/migrator-platform \
            --namespace ${{ env.KUBE_NAMESPACE }} \
            --create-namespace \
            --set image.tag=${{ needs.build-and-push.outputs.image-tag }} \
            --set image.registry=${{ env.REGISTRY }} \
            --set image.repository=${{ github.repository }} \
            --set secrets.anthropicApiKey=${{ secrets.ANTHROPIC_API_KEY }} \
            --set secrets.postgresPassword=${{ secrets.STAGING_DB_PASSWORD }} \
            --set secrets.secretKey=${{ secrets.STAGING_SECRET_KEY }} \
            --set config.environment=staging \
            --set ingress.hosts[0].host=${{ vars.STAGING_HOSTNAME }} \
            --set ingress.hosts[0].paths[0].path=/ \
            --set ingress.hosts[0].paths[0].pathType=Prefix \
            --set ingress.tls[0].secretName=migrator-staging-tls \
            --set ingress.tls[0].hosts[0]=${{ vars.STAGING_HOSTNAME }} \
            --wait \
            --timeout 10m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/${{ env.HELM_RELEASE }}-migrator-platform-api \
            -n ${{ env.KUBE_NAMESPACE }} \
            --timeout=300s

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          BASE_URL="https://${{ vars.STAGING_HOSTNAME }}"

          echo "=== Health check ==="
          STATUS=$(curl -sf -o /dev/null -w '%{http_code}' "${BASE_URL}/health" || echo "000")
          if [[ "$STATUS" != "200" ]]; then
            echo "FAIL: Health check returned HTTP ${STATUS}"
            exit 1
          fi
          echo "PASS: Health check returned 200"

          echo ""
          echo "=== API docs endpoint ==="
          STATUS=$(curl -sf -o /dev/null -w '%{http_code}' "${BASE_URL}/docs" || echo "000")
          if [[ "$STATUS" != "200" ]]; then
            echo "FAIL: /docs returned HTTP ${STATUS}"
            exit 1
          fi
          echo "PASS: /docs returned 200"

          echo ""
          echo "=== API v1 endpoint ==="
          STATUS=$(curl -sf -o /dev/null -w '%{http_code}' "${BASE_URL}/api/v1/" || echo "000")
          echo "API v1 returned HTTP ${STATUS}"

          echo ""
          echo "All smoke tests passed."
