# Alembic configuration for MuleSoft-to-SpringBoot Migrator
#
# Run migrations:
#   alembic upgrade head
#   alembic downgrade -1
#   alembic revision --autogenerate -m "description"

[alembic]
script_location = alembic
prepend_sys_path = .

# The sqlalchemy.url is overridden at runtime by env.py using app config.
# This fallback is only used if env.py fails to set it.
sqlalchemy.url = postgresql+asyncpg://migrator:migrator_secret@localhost:5432/migrator

# Template for new migration file names
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 60
revision_environment = false
sourceless = false
version_locations = %(here)s/alembic/versions

# Output encoding
output_encoding = utf-8

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
