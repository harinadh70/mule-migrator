# =================================================================
#  Dev Overrides — Hot Reload, Debug Logging, Exposed Ports
#
#  Usage:
#    docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# =================================================================

services:
  api:
    build:
      target: base
    command: >
      uvicorn api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/api
      --log-level debug
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: debug
      DEBUG: "true"
      UVICORN_WORKERS: 1
    volumes:
      - ../../api:/app/api:cached
      - ../../backend:/app/backend:cached
    ports:
      - "${API_PORT:-8000}:8000"
      - "5678:5678"  # debugpy remote debugging
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G

  celery-migration-worker:
    command: >
      celery -A api.tasks.celery_app worker
      --queues=migration
      --concurrency=1
      --loglevel=debug
      --hostname=migration@%h
    environment:
      LOG_LEVEL: debug
    volumes:
      - ../../api:/app/api:cached

  celery-build-worker:
    command: >
      celery -A api.tasks.celery_app worker
      --queues=build
      --concurrency=1
      --loglevel=debug
      --hostname=build@%h
    environment:
      LOG_LEVEL: debug
    volumes:
      - ../../api:/app/api:cached

  celery-indexing-worker:
    command: >
      celery -A api.tasks.celery_app worker
      --queues=indexing
      --concurrency=1
      --loglevel=debug
      --hostname=indexing@%h
    environment:
      LOG_LEVEL: debug
    volumes:
      - ../../api:/app/api:cached

  celery-beat:
    environment:
      LOG_LEVEL: debug
    volumes:
      - ../../api:/app/api:cached

  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_LOG_STATEMENT: all

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  qdrant:
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"

  nginx:
    profiles:
      - with-nginx  # disabled by default in dev
