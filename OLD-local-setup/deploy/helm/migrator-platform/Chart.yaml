apiVersion: v2
name: migrator-platform
description: MuleSoft-to-SpringBoot Agentic AI Migration Platform
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - mulesoft
  - springboot
  - migration
  - ai
  - agentic
home: https://github.com/your-org/mulesoft-to-springboot-migrator
maintainers:
  - name: Platform Team
    email: platform@your-org.com

dependencies:
  - name: postgresql
    version: "15.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "19.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
