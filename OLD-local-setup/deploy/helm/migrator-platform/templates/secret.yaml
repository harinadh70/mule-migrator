apiVersion: v1
kind: Secret
metadata:
  name: {{ include "migrator-platform.fullname" . }}-secrets
  labels:
    {{- include "migrator-platform.labels" . | nindent 4 }}
type: Opaque
data:
  SECRET_KEY: {{ .Values.secrets.secretKey | default (randAlphaNum 64) | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | b64enc | quote }}
  DATABASE_URL: {{ include "migrator-platform.databaseUrl" . | b64enc | quote }}
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.googleApiKey }}
  GOOGLE_API_KEY: {{ .Values.secrets.googleApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.deepseekApiKey }}
  DEEPSEEK_API_KEY: {{ .Values.secrets.deepseekApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.groqApiKey }}
  GROQ_API_KEY: {{ .Values.secrets.groqApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.jwtPrivateKey }}
  JWT_PRIVATE_KEY: {{ .Values.secrets.jwtPrivateKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.jwtPublicKey }}
  JWT_PUBLIC_KEY: {{ .Values.secrets.jwtPublicKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.githubClientId }}
  GITHUB_CLIENT_ID: {{ .Values.secrets.githubClientId | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.githubClientSecret }}
  GITHUB_CLIENT_SECRET: {{ .Values.secrets.githubClientSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.apiKeyFernetKey }}
  API_KEY_FERNET_KEY: {{ .Values.secrets.apiKeyFernetKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.qdrantApiKey }}
  QDRANT_API_KEY: {{ .Values.secrets.qdrantApiKey | b64enc | quote }}
  {{- end }}
