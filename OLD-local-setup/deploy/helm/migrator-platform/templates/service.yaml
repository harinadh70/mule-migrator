apiVersion: v1
kind: Service
metadata:
  name: {{ include "migrator-platform.fullname" . }}-api
  labels:
    {{- include "migrator-platform.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "migrator-platform.componentSelectorLabels" (dict "root" . "component" "api") | nindent 4 }}
---
{{- if .Values.qdrant.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "migrator-platform.fullname" . }}-qdrant
  labels:
    {{- include "migrator-platform.componentLabels" (dict "root" . "component" "qdrant") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.qdrant.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.qdrant.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "migrator-platform.componentSelectorLabels" (dict "root" . "component" "qdrant") | nindent 4 }}
{{- end }}
