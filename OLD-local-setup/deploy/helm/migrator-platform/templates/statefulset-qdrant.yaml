{{- if .Values.qdrant.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "migrator-platform.fullname" . }}-qdrant
  labels:
    {{- include "migrator-platform.componentLabels" (dict "root" . "component" "qdrant") | nindent 4 }}
spec:
  serviceName: {{ include "migrator-platform.fullname" . }}-qdrant
  replicas: 1
  selector:
    matchLabels:
      {{- include "migrator-platform.componentSelectorLabels" (dict "root" . "component" "qdrant") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "migrator-platform.componentSelectorLabels" (dict "root" . "component" "qdrant") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: qdrant
          image: {{ include "migrator-platform.qdrantImage" . }}
          imagePullPolicy: {{ .Values.qdrant.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.qdrant.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.qdrant.grpcPort }}
              protocol: TCP
          env:
            - name: QDRANT__SERVICE__GRPC_PORT
              value: {{ .Values.qdrant.grpcPort | quote }}
            - name: QDRANT__STORAGE__STORAGE_PATH
              value: /qdrant/storage
            - name: QDRANT__STORAGE__SNAPSHOTS_PATH
              value: /qdrant/snapshots
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.qdrant.resources | nindent 12 }}
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
            - name: qdrant-snapshots
              mountPath: /qdrant/snapshots
      volumes:
        - name: qdrant-snapshots
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: qdrant-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.qdrant.persistence.storageClass }}
        storageClassName: {{ .Values.qdrant.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.qdrant.persistence.size }}
{{- end }}
