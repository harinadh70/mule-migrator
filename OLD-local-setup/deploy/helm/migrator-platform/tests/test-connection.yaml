apiVersion: v1
kind: Pod
metadata:
  name: {{ include "migrator-platform.fullname" . }}-test-connection
  labels:
    {{- include "migrator-platform.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-api-health
      image: curlimages/curl:latest
      command:
        - sh
        - -c
        - |
          echo "=== Testing API health endpoint ==="
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            http://{{ include "migrator-platform.fullname" . }}-api:{{ .Values.api.port }}/health)
          if [ "$STATUS" = "200" ]; then
            echo "PASS: API returned HTTP $STATUS"
          else
            echo "FAIL: API returned HTTP $STATUS"
            exit 1
          fi

          echo ""
          echo "=== Testing Qdrant health ==="
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            http://{{ include "migrator-platform.fullname" . }}-qdrant:{{ .Values.qdrant.port }}/healthz)
          if [ "$STATUS" = "200" ]; then
            echo "PASS: Qdrant returned HTTP $STATUS"
          else
            echo "FAIL: Qdrant returned HTTP $STATUS"
            exit 1
          fi

          echo ""
          echo "All connectivity tests passed."
